services:
  postgres:
    image: postgres:15-alpine
    container_name: cefanet_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cefanet
      POSTGRES_PASSWORD: cefanet
      POSTGRES_DB: cefanet_dnb
    ports:
      - "5432:5432"
    volumes:
      - cefanet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cefanet -d cefanet_dnb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cefanet_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cefanet_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cefanet_pgdata:
  cefanet_redisdata:
